<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo API | Tarefas</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-icon"><i class="fa-solid fa-list-check"></i></span>
                <div>
                    <strong>Todo API</strong>
                    <small>Gerenciador de tarefas</small>
                </div>
            </div>

            <nav class="status-menu" aria-label="Filtros de status">
                <button class="filter-button active" type="button" data-filter="ALL">
                    <i class="fa-solid fa-layer-group"></i>
                    Todas
                    <span id="countAll">0</span>
                </button>
                <button class="filter-button" type="button" data-filter="PENDING">
                    <i class="fa-regular fa-clock"></i>
                    Pendentes
                    <span id="countPending">0</span>
                </button>
                <button class="filter-button" type="button" data-filter="IN_PROGRESS">
                    <i class="fa-solid fa-spinner"></i>
                    Em progresso
                    <span id="countProgress">0</span>
                </button>
                <button class="filter-button" type="button" data-filter="DONE">
                    <i class="fa-solid fa-circle-check"></i>
                    Concluidas
                    <span id="countDone">0</span>
                </button>
            </nav>
        </aside>

        <main class="content">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Spring Boot + JavaScript</p>
                    <h1>Minhas tarefas</h1>
                </div>
                <button class="refresh-button" type="button" id="refreshButton" title="Atualizar lista">
                    <i class="fa-solid fa-rotate-right"></i>
                    Atualizar
                </button>
            </header>

            <section class="task-form-section" aria-labelledby="formTitle">
                <div class="section-heading">
                    <h2 id="formTitle">Nova tarefa</h2>
                    <button class="ghost-button hidden" type="button" id="cancelEditButton">
                        <i class="fa-solid fa-xmark"></i>
                        Cancelar edicao
                    </button>
                </div>

                <form id="taskForm" class="task-form">
                    <input type="hidden" id="taskId">

                    <label for="title">
                        Titulo
                        <input id="title" name="title" type="text" minlength="3" maxlength="100" placeholder="Ex.: Estudar Spring Security" required>
                    </label>

                    <label for="description">
                        Descrição
                        <textarea id="description" name="description" rows="4" placeholder="Detalhe o que precisa ser feito" required></textarea>
                    </label>

                    <label for="status">
                        Status
                        <select id="status" name="status">
                            <option value="PENDING">Pendente</option>
                            <option value="IN_PROGRESS">Em progresso</option>
                            <option value="DONE">Concluída</option>
                        </select>
                    </label>

                    <button class="primary-button" type="submit" id="submitButton">
                        <i class="fa-solid fa-plus"></i>
                        Criar tarefa
                    </button>
                </form>
            </section>

            <section class="tasks-section" aria-labelledby="tasksTitle">
                <div class="section-heading">
                    <div>
                        <h2 id="tasksTitle">Lista de tarefas</h2>
                        <p id="listSubtitle">Carregando tarefas...</p>
                    </div>
                </div>

                <div id="alert" class="alert hidden" role="status"></div>
                <div id="loading" class="loading">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    Buscando tarefas
                </div>
                <div id="taskList" class="task-list"></div>
                <div id="emptyState" class="empty-state hidden">
                    <i class="fa-regular fa-clipboard"></i>
                    <strong>Nenhuma tarefa encontrada</strong>
                    <span>Crie uma nova tarefa ou ajuste o filtro selecionado.</span>
                </div>
            </section>
        </main>
    </div>

    <script src="./js/script.js"></script>
</body>
</html>
